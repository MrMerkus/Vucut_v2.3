<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vücut & El Takip Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-wrapper">
    <header>
      <div class="title-group">
        <span class="tag">MEDIAPIPE v0.10 · ÇOK KİŞİ MODU</span>
        <h1>HAREKET ANALİZ SİSTEMİ</h1>
        <p class="subtitle">Gerçek zamanlı çoklu vücut, el & yüz takibi</p>
      </div>
      <div class="header-controls">
        <div class="fps-badge"><span id="fps-display">0</span> FPS</div>
        <div class="person-badge">KİŞİ: <span id="person-count">0</span></div>
        <div class="model-badge" id="model-status">● MODEL YÜKLENİYOR</div>
      </div>
    </header>

    <div class="layout">
      <!-- SOL: Kamera -->
      <div class="camera-section">
        <div class="canvas-container" id="canvasContainer">
          <video id="webcam" autoplay playsinline></video>
          <canvas id="output_canvas"></canvas>
          <div class="overlay-grid"></div>
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="camera-placeholder" id="cameraPlaceholder">
            <div class="placeholder-icon">⬡</div>
            <p>Kamerayı açmak için butona tıklayın</p>
          </div>
        </div>
        <div class="camera-controls">
          <button id="webcamButton" class="btn-primary">
            <span class="btn-icon">◉</span>
            <span id="btnText">KAMERAYI AÇ</span>
          </button>
          <button id="screenshotButton" class="btn-secondary" disabled>
            <span class="btn-icon">⬛</span>
            EKRAN GÖRÜNTÜSÜ
          </button>
        </div>
      </div>

      <!-- SAĞ: Metrikler (dinamik) -->
      <div class="metrics-panel" id="metrics-panel">
        <div class="no-person-msg" id="no-person-msg">
          <div class="no-person-icon">⬡</div>
          <p>Kişi algılanmadı</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
